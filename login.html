<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GrahanIA</title>

    <!-- Framework CSS Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS do projeto -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main class="auth-container">

        <!-- Formulário de autenticação -->
        <section class="auth-box">
            <a href="index.html">
                <img src="img/logo.png" class="auth-logo" alt="Logotipo da GrahanIA">
            </a>

            <h1>Entrar</h1>

            <form action="dashboard.html" method="get">
                <label for="email-login">E-mail</label>
                <input type="email" id="email-login" name="email" placeholder="Seu e-mail" required>

                <label for="senha-login">Senha</label>
                <input type="password" id="senha-login" name="senha" placeholder="Sua senha" required>

                <button type="submit" class="btn btn-primary">Entrar</button>
            </form>

            <p>
                Não possui conta?
                <a href="registro.html">Registrar</a>
            </p>
        </section>

    </main>

</body>
</html>
