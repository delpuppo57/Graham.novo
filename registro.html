<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | GrahanIA</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<main class="auth-container">

    <section class="auth-box">
        <a href="index.html">
            <img src="img/logo.png" class="auth-logo" alt="Logotipo da GrahanIA">
        </a>

        <h1>Criar conta</h1>

        <form action="dashboard.html" method="get">
            <label for="nome-registro">Nome</label>
            <input type="text" id="nome-registro" name="nome" placeholder="Seu nome" required>

            <label for="email-registro">E-mail</label>
            <input type="email" id="email-registro" name="email" placeholder="Seu e-mail" required>

            <label for="confirmar-email-registro">Confirmar e-mail</label>
            <input type="email" id="confirmar-email-registro" name="confirmar-email" placeholder="Confirme seu e-mail" required>

            <label for="senha-registro">Senha</label>
            <input type="password" id="senha-registro" name="senha" placeholder="Sua senha" required>

            <label for="confirmar-senha-registro">Confirmar senha</label>
            <input type="password" id="confirmar-senha-registro" name="confirmar-senha" placeholder="Confirme sua senha" required>

            <button type="submit" class="btn btn-primary">Criar conta</button>
        </form>

        <p>
            Já possui conta?
            <a href="dashboard.html">Entrar</a>
        </p>
    </section>

</main>

<script src="js/tema.js"></script>
</body>
</html>
